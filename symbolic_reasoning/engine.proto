// 航路点
message CourseWaypoint {
  optional double longitude = 1;
  optional double latitude = 2;
}

// 单位数据
message SetUnitDataRequest {
  // 单位ID（必填）
  string unit_id = 1;

  // ---- 基础信息 ----
  // 修改单位名称
  optional string new_name = 2;

  // ---- 位置信息 ----
  // 经度
  optional double longitude = 3;
  // 纬度
  optional double latitude = 4;
  // 朝向（度）
  optional float heading = 5;
  // 期望朝向（度）
  optional float desired_heading = 6;
  // 速度（节）
  optional float speed = 7;
  // 是否强制设置速度（超过最大速度时）
  optional bool force_speed = 8;
  // 油门设置: "FullStop", "Loiter", "Cruise", "Full", "Flank"
  optional string throttle = 9;
  // 高度（飞机，米）或深度（潜艇，负值米）
  optional float altitude = 10;
  // 是否以"移动到"方式设置高度（true=设置期望高度，false=直接设置当前高度）
  optional bool move_to = 11;

  // ---- 航路点 ----
  // 航路点列表（设置后会清除现有航路并重新设定）
  repeated CourseWaypoint course = 12;

  // ---- 行为控制 ----
  // 是否起飞/出港
  optional bool launch = 13;
  // 是否返航
  optional bool rtb = 14;
  // 保持阵位
  optional bool hold_position = 15;
  // 停火
  optional bool hold_fire = 16;
  // 自动可探测
  optional bool auto_detectable = 17;
  // 断开通信
  optional bool out_of_comms = 18;
  // 冲刺-漂流模式（潜艇）
  optional bool sprint_drift = 19;
  // 避免空泡（潜艇）
  optional bool avoid_cavitation = 20;
  // 搜救资格
  optional bool csar = 21;

  // ---- 熟练度 ----
  // 熟练度: "Novice", "Cadet", "Regular", "Veteran", "Ace"
  optional string proficiency = 22;

  // ---- 任务 ----
  // 分配任务名称（空字符串表示取消任务分配）
  optional string mission = 23;

  // ---- 传感器操作 ----
  // 添加的传感器数据库ID列表
  repeated int32 sensor_add = 24;
  // 移除的传感器ObjectID列表
  repeated string sensor_remove = 25;

  // ---- 燃料 ----
  // 是否加满燃料
  optional bool refuel = 26;
}

// ---- 武器发射信息 ----

// 获取武器发射信息请求
message GetWeaponFiringInfoRequest {
  // 我方攻击单位ID
  string attacker_unit_id = 1;
  // 敌方目标单位ID（支持单位GUID或接触ID/ContactID）
  string target_unit_id = 2;
}

// 武器开火评估（对应每个挂架上该武器的开火状态）
message WeaponFireEvaluation {
  // 当前挂架或挂载点上该武器的弹药数量。
  int32 quantity = 1;
  // 该挂载点上的武器当前是否具备发射条件（如是否在射程内、是否射界被遮挡、是否有传感器支持等）。
  bool can_fire = 2;
  // 开火评估结果的描述（如 "可以开火（手动武器分配）" 或不能发射的具体原因，例如 "不在射界内 (Orientation restriction)"）。
  string evaluation = 3;
}

// 单个武器的发射详情，每一个适合的武器都会有一个详细的开火与配置评估
message WeaponFiringDetail {
  // 武器数据库ID，分配手动攻击时需要传入此 ID。
  int32 weapon_db_id = 1;
  // 武器名称（如 "130mm China H/PJ-38 HE"）
  string weapon_name = 2;
  // 攻击单位上该武器的可用总数量（含所有挂架上和弹药库内直接可用的数量之和）。
  int32 total_quantity = 3;
  // 该武器已被消耗（发射掉）或未装填的缺失数量。（该单位该武器的 所有挂架和弹药库的最大总容量之和 减去 所有挂架和弹药库当前剩余的总可用弹药量之和）。
  int32 allocated_quantity = 4;
  // 存放在所有弹药库（Magazine）中的数量之和（不包含挂架上已经就绪的弹药）（通常不能直接发射，需要先装填到挂架或发射架）。
  int32 magazine_quantity = 5;
  // 根据想定当前的条令与状态，是否允许该武器自动射击目标。
  bool auto_fire_allowed = 6;
  // 当不允许自动射击时，这里会记录具体原因（如 "Weapon Control Status (WCS) is WEAPONS HOLD" 或未授权的 WRA 规则）。（空字符串表示允许）
  string auto_fire_denied_reason = 7;
  // 武器控制状态 WCS（Free （自由开火） /Tight（严密控制，仅识别为 敌对的 才可开火） /Hold（停止开火） ）
  string wcs = 8;
  // 武器释放授权 WRA 描述 （如齐射的数量规则和射程限制描述）
  string wra = 9;
  // 各弹药库上（不包括弹药库）该武器的具体开火评估。
  repeated WeaponFireEvaluation fire_evaluations = 10;
  // 武器GUID
  string guid = 11;
}

// 武器齐射分配信息
message WeaponSalvoAllocation {
  // 武器数据库ID
  int32 weapon_db_id = 1;
  // 齐射使用的武器名称。
  string weapon_name = 2;
  // 已分配但尚未发射的弹药数量（即处于待发状态）。
  int32 quantity_assigned = 3;
  // 已经发射出去的弹药数量。
  int32 quantity_fired = 4;
  // 是否为玩家/接口手动分配的齐射（true 代表手动，false 代表系统 AI 自动分配）。
  bool is_manual = 5;
  // 该齐射对应的目标名称（分配给所有目标时显示目标名）
  string target_name = 6;
  // 齐射的特殊开火模式描述（如高空引爆标志 "[HIGH ALT]"，或者航路点标志 "[3航段]" 等）。
  string special_mode = 7;
  // 齐射分配ID（GUID），用于区分每次发送的请求
  string guid = 8;
}

// 获取武器发射信息响应
message GetWeaponFiringInfoResponse {
  // 攻击者id
  string attacker_unit_id = 1;
  // 攻击方单位名称（如“DDG 138 泰州号”）
  string attacker_name = 2;
  // 目标id
  string target_unit_id = 3;
  // 当前阵营视角下的目标名称（Contact 视角下的名称） 例如“Type 052D Luyang III [DDG] #1”
  string target_name = 4;
  // 适合攻击该目标的武器列表。只包含当前攻击单位装载的、且能够/适合用来攻击该目标类型（如防空、反舰或反潜）的武器详情。
  repeated WeaponFiringDetail suitable_weapons = 5;
  // 该攻击单位当前已分配给该特定目标的武器齐射信息（包括已分配待发射、或已发射正在途中的齐射）。
  repeated WeaponSalvoAllocation salvos_to_target = 6;
  // 该攻击单位当前分配给想定中所有目标的全部武器齐射信息。
  repeated WeaponSalvoAllocation salvos_to_all = 7;
}

// ---- 攻击目标 ----

// 手动武器分配攻击请求
message AttackTargetRequest {
  // 我方攻击单位ID（必填）
  string attacker_unit_id = 1;
  // 敌方目标单位ID（必填，支持单位GUID或接触ID/ContactID）
  string target_unit_id = 2;
  // 武器数据库ID（必填，对应 WeaponFiringDetail.weapon_db_id）
  int32 weapon_db_id = 3;
  // 分配 of the 武器数量（manual手动模式必填，> 0）
  int32 quantity = 4;
  // 攻击模式（可选）：
  //   "manual" = 手动指定数量分配（默认）
  //   "salvo"  = 按条令分配一个齐射（忽略 quantity，由 WRA 决定数量）
  //   "all"    = 分配该武器所有可用数量
  optional string mode = 5;
}

// 获取单位数据请求
message GetUnitDataRequest {
  // 单位ID（支持单位GUID或接触ID/ContactID）
  string unit_id = 1;
  optional string side_id = 2;
}

