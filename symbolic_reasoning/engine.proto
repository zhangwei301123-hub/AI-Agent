syntax = "proto3";

import "google/protobuf/any.proto";
import "google/protobuf/empty.proto";
option csharp_namespace = "EngineGrpc";
option java_package = "com.engine.sdk.grpc.proto";
option java_multiple_files = true;

package proto;

service SimulationService {
  // 获取想定列表
  rpc GetScenarioList(EmptyRequest) returns (GetScenarioListResponse);
  // 加载想定
  rpc LoadScenarioByFilePath(LoadScenarioRequest) returns (ScenInfo);
  // 开始/继续运行想定
  rpc StartScenario(EmptyRequest) returns (EmptyResponse);
  // 暂停想定
  rpc PauseScenario(EmptyRequest) returns (EmptyResponse);
  // 结束想定
  rpc EndScenario(EmptyRequest) returns (EmptyResponse);
  // 重新推演
  rpc ReDeduction(EmptyRequest) returns (EmptyResponse);
  // 设置倍速
  rpc SetTimeCompress(SetTimeCompressRequest) returns (EmptyResponse);
  // 设置仿真步长
  rpc SetSimStep(SetSimStepRequest) returns (EmptyResponse);
  // 获取引擎运行状态
  rpc GetEngineStatus(EmptyRequest) returns (EngineStatusResponse);
  // 获取单帧态势数据
  rpc GetThreeSituation(ThreeSituationRequest) returns (ThreeSituationResponse);
  // 订阅持续推送态势数据
  rpc SubscribeThreeSituation(ThreeSituationRequest) returns (stream ThreeSituationResponse);
  // 取消订阅持续推送态势数据
  rpc UnsubscribeThreeSituation(UnsubscribeRequest) returns (EmptyResponse);
  // 获取单位数据
  rpc GetUnitData(GetUnitDataRequest) returns (GetUnitDataResponse);
  // 修改单位数据
  rpc SetUnitData(SetUnitDataRequest) returns (EmptyResponse);

  // 获取武器发射信息（根据我方单位ID和敌方单位ID）
  rpc GetWeaponFiringInfo(GetWeaponFiringInfoRequest) returns (GetWeaponFiringInfoResponse);
  // 手动武器分配攻击（指定武器和数量攻击目标）
  rpc AttackTarget(AttackTargetRequest) returns (EmptyResponse);

  // =================================== WHU 需要的protocol ======================================
  // 开始推演
  rpc startDedicew(IdRequestw) returns (ResponseDataw);
  // 暂停推演
  rpc pauseDedicew(google.protobuf.Empty) returns (ResponseDataw);
  // 获取时间压缩（倍速）
  rpc getTimeCompression(google.protobuf.Empty) returns (TimeCompression);
  // 获取推演结束信号
  rpc getEndSignal(google.protobuf.Empty) returns (EndSignalw);// 如果结束了就返回true，如果没有结束就返回false

  // 态势获取与战报获取方法
  // 获取态势数据
  rpc getSituation(google.protobuf.Empty) returns (SituationDatas);
  // 获取使用/损耗战损报告
  rpc getUseUpReportw(google.protobuf.Empty) returns (UseUpReports);
  // 获取攻击/战损报告
  rpc getAttackReport(google.protobuf.Empty) returns (AttackReports);
  // 获取侦察/探测报告
  rpc getDetectionReport(google.protobuf.Empty) returns (DetectionReports);
  // 获取作参考点/参考区域
  rpc getCombatArea(google.protobuf.Empty) returns (AreaPointList);
  // 获取任务列表
  rpc getMissionList(google.protobuf.Empty) returns (MissionList);

  // 智能体动作执行与指控接口的8类方法（9个）
  // 飞机单机起飞
  rpc aircraftTakeOffSinglew(IdRequestw) returns (ResponseDataw);
  // 飞机返航至基地
  rpc aircraftReturnToBasew(IdRequestw) returns (ResponseDataw);
  // 设置实体机动航路
  rpc setUnitRoutew(UnitRoutew) returns (ResponseDataw);
  // 设置实体机动海拔高度和速度
  rpc adjustUnitAltitudeAndSpeed(UnitAltitudeAndSpeedw) returns (ResponseDataw);
  // 打击目标
  rpc attackContactw(AttackRequestw) returns (ResponseDataw);
  // 纯方位攻击
  rpc attackOrientationw(AttackOrientationw) returns (ResponseDataw); 
  // 传感器控制
  rpc controlUnitSensorw(SensorControlRequestw) returns (ResponseDataw);
  // 部署声纳浮标
  rpc delpoySonobuoyw(SonobuoyDelpoyRequestw) returns (ResponseDataw);
  // 放弃打击
  rpc cancelAttackw(IdRequestw) returns (ResponseDataw);
}

message EmptyRequest {}

message EmptyResponse {}

message ScenTreeModel {
  string scen_file_path = 1;
  bool is_scen_file = 2;
  string scen_file_name = 3;
  string start_time = 4;
  string duration_time = 5;
  string current_time = 6;
  string description = 7;
  int32 difficulty = 8;
  int32 complexity = 9;
  int32 year = 10;
  repeated ScenTreeModel children = 11;
}

message GetScenarioListResponse {
  repeated ScenTreeModel scenarios = 1;
}

message LoadScenarioRequest {
  string scen_file_path = 1;
}

message ScenSide {
  string guid_str = 1;
  string side_name = 2;
  string color_name = 3;
  string side_description = 4;
}

message ScenInfo {
  string scen_id = 1;
  int32 difficult = 2;
  int32 complexity = 3;
  string year = 4;
  string scen_title = 5;
  string start_time = 6;
  string duration = 7;
  string description = 8;
  repeated ScenSide side_list = 9;
}

message SetTimeCompressRequest {
  int32 time_compress = 1;
}

message SetSimStepRequest {
  string sim_step = 1;
}

message ThreeSituationRequest {
  int64 user_id = 1;
  string side_guid = 2;
  bool is_god_view = 3;
  bool is_distribute = 4;
}

message UnsubscribeRequest {
  string subscription_id = 1;
}

message ThreeSituationResponse {
  string side_guid = 1;
  bool is_god_view = 2;
  google.protobuf.Any data = 3;
}

// 引擎运行状态枚举
enum EngineRunStatus {
  STATUS_UNKNOWN = 0;
  STATUS_INIT = 1;      // 初始化 / 未加载
  STATUS_RUNNING = 2;   // 运行中
  STATUS_PAUSED = 3;    // 暂停中
  STATUS_ENDED = 4;     // 已结束
}

// 获取引擎运行状态响应
message EngineStatusResponse {
  string scen_id = 1;
  int32 difficult = 2;
  int32 complexity = 3;
  string year = 4;
  string scen_title = 5;
  string start_time = 6;
  string duration = 7;
  string description = 8;
  repeated ScenSide side_list = 9;
  // 参考 EnumTimeCompression
  int32 time_compress = 10;
  string sim_step = 11;
  EngineRunStatus run_status = 12;
}

// ==================== RL仿真控制类接口消息定义 (与SimulationControlInstruction.proto一致) ====================

//想定文件请求
message ScenarioFileRequest {
    string fileName = 1;    //想定文件名称
    string scenarioXml = 2;  //xml格式想定文件
}

//返回信息
message ResponseData {
    int32 code = 1;         //状态码
    string message = 2;   //状态信息
    string cmd = 3;
    string data = 4;//具体数据
}

//返回信息(武大)
message ResponseDataw {
    int32 code = 1;         //状态码 1：成功  0失败
    string error_message = 2;
}

//仅需要ID(武大)
message IdRequestw {
    string mdlID = 1;  //id
}

//加速比枚举
enum EnumTimeCompression {
    OneSec = 0;//1秒
    TwoSec = 1;//2秒
    FiveSec = 2;//5秒
    TenSec = 3;//10秒
    FifteenSec = 4;//15秒
    ThirtySec = 5;//30秒
    FortySec = 6;//40秒
    FiftySec = 7;//50秒
    SixtySec = 8;//60秒
    Turbo = 9;//急速
}

//设置加速比请求
message TimeCompressionRequest {
    EnumTimeCompression timeCompression = 1;  //加速比
}

//获取加速比返回
message TimeCompression {
    int32 timeCompression = 1;//0:1、1:2、2:5、3:10、4:15、5:30、6:40、7:50、8:60、9:Turbo
}

//推演结束信号
message EndSignalw {
    int32 code = 1;         //状态码 1：结束  0 ：未结束 2：暂停 3：开始
}

//单装信息
message SituationDataw {
    string forceSide = 1;
    int32 activeLvl = 2;

    message Attitudew {
        float pitch = 1;
        float roll = 2;
        float yaw = 3;
    }
    Attitudew attitude = 3;

    message AttrMapw {
        string AirBase = 1;
    }
    AttrMapw attrMapw = 4;

    message EntitySpatialCoordw {
        double altitude = 1;
        double latitude = 2;
        double longitude = 3;
    }
    EntitySpatialCoordw entitySpatialCoord = 5;

    message LoadMapw {
        int32 offensive = 1;
        int32 offenseless = 2;
    }
    LoadMapw loadMap = 6;

    message LogisticStatesw {
        float oil = 1;   //油量百分
        string oilStatus = 2;//燃油状态
    }
    LogisticStatesw logisticStates = 7;

    message InnerStatesw {
        int32 IsJamReaction = 1;
    }
    InnerStatesw innerstates = 8;

    string mdlID = 9;
    string mdlType = 10;
    int64 reportTime = 11;

    message StateMapw {
        float FuelBurnRate = 1;
        int32 EcmStatus = 2;
        int32 RadarStatus = 3;
        int32 SonarStatus = 4;
        string AirStatus = 5;
        int32 RemainDistance = 6;
        string UnitStatus = 7;
        int32 IdentifyStatus = 8;
    }
    StateMapw stateMap = 12;

    message Velocityw {
        float vx = 1;
        float vy = 2;
        float vz = 3;
    }
    Velocityw velocity = 13;
    int32 IsUnderAttack = 14; // 如果是敌方实体 该值为是否被攻击 1为被攻击 0为未攻击 -1为无意义

    message MaxRange{
        double maxAir=1;//对空0
        double maxSubsurface=2;//水下1
        double maxSurface=3;//水面2
        double maxLand=4;//地面3
    }
    MaxRange maxRange = 15;//最大攻击距离
    UnitCategory unitCategory = 16; //单位所属类型
    bool isCanManaged=17;//单位是否被智能体接管
    string missionId = 18;//任务id
    int32 missionType = 19;//任务类型
    repeated int32 unitTarget = 20;//单位可以攻击的目标类型
    message WeaponNumber{
        int32 airNum=1;//对空中
        int32 subNum=2;//水下
        int32 shipNum=3;//水面
    }
    WeaponNumber weaponNumber = 21;//武器数量
    int32 contactType = 22;//目标所属类型
}

//单装信息集合
message SituationDatas {
    repeated SituationDataw situaction = 1;    //阵营数据
}

// 战损报告s
message UseUpReports{
    repeated UseUpReportw useUpReport = 1;
}
// 战损报告
message UseUpReportw {
    string forceSide = 1; //阵营
    string id = 2;   //被击中单位id
    string type = 3; // 损失的单位类型  船 飞机  潜艇 导弹
    int32 time = 4; //被击中的时间
    float damage_degree = 5; //被击中单位损失程度
}
// 战报信息s
message AttackReports {
    repeated AttackReportw attackReport = 1;
}
// 战报信息
message AttackReportw {
    string launch_platform_id = 1; //发射载体id 是船发射的 还是飞机发射的
    string attack_target_type = 2;  //被击中单位类型 如果没击中则返回空
    bool hit = 3; //是否命中
    int32 fire_time = 4;  //发射时帧数
    float target_damage_degree = 5; //被击中单位损失程度 如果没有击中则为0
    string weaponId = 6; //武器单位id
}
// 探测报告s
message DetectionReports{
    repeated DetectionReportw detectionReport = 1;
}
// 探测报告
message DetectionReportw {
    string targetId = 1; //目标Id
    string targetType = 2;    //目标类型
    string detectorId = 3;         
    string detectorType = 4;    
    int64 detectStep = 5;   
    bool isSonobuoy = 6; 
}
// 参考点信息
message AreaPoint {
    string id = 1;      //参考点id
    string name = 2;      //参考点名称
    string sideName = 3;  //阵营名称
    double lon = 4;      //参考点经度
    double lat = 5;      //参考点纬度
    string relativeToUnit = 6;      //参考点移动相对单位id
    BearingType bearingType = 7;      //参考点移动方位类型
}
message AreaPointList {
    repeated AreaPoint areaPointList = 1; //参考点集合
    string sideName = 2;  //阵营名称
}
enum BearingType {
    Fixed = 0; //固定方位
    Rotating = 1; //相对方位
}
// 任务列表
message MissionList{
    message Mission{
        string missionId = 1; //任务id
        string missionName = 2; //任务名称
        int32 missionType = 3; //任务类型
        repeated AreaPoint areaPoints = 4; //区域参考点集合
    }
    repeated Mission mission = 1;
}

message WayPointw {
    double longitude = 1;  //经度
    double latitude = 2;  //纬度
    int32 altitude = 3;  //离散化后的期望高度
    int32 velocity = 4;  //离散化后的期望速度
}

message UnitRoutew {
    string mdlID = 1;  //实体id
    repeated WayPointw Route = 2;  //航路点
}

message UnitAltitudeAndSpeedw {
    string mdlID = 1;              //实体id
    int32 velocity = 2;            //速度
    int32 altitude = 3;            //海拔离散化的高度（深度）单位
}

message AttackRequestw {
    string attackerId = 1;    //攻击者id
    string contactId = 2;     //打击目标id
}

message AttackOrientationw {
    string attackerId = 1;  //攻击者id
    double lon = 2;         //经度
    double lat = 3;         //纬度
}

message SensorControlRequestw {
    string id = 1;   //实体id
    bool radar = 2;  //雷达
    bool sonar = 3;  //声纳
    bool ecm = 4;    //电子战传感器运行状态,true：开启,false:关闭，为空时保持现状
}

message SonobuoyDelpoyRequestw {
    string id = 1;  //实体id
    bool passiveOrActive = 2;  //被动声呐浮标或者主动声呐浮标
    bool shallowOrDeep = 3;    // 浮标部署位置是浅深度还是最大深度
}

