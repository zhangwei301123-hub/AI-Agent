//打击任务
message StrikeMission{
    string id = 1;   //任务id
    string name = 2;   //任务名称
    string sideName = 3;   //所属阵营名称
    StrikeType strikeType = 4;   //打击任务类型
    string startTime = 5;   //任务开始时间
    string endTime = 6;   //任务结束时间
    repeated string strikeMembers = 7;   //执行打击的成员CombatUnit的id
    repeated string escortMembers = 8;   //护航打击的成员CombatUnit的id
    repeated string strikeTargets = 9;   //打击目标Contact的id
    map<int32, int32> weaponLimits = 10;  //使用武器限制，武器DBID：武器数量
    repeated WayPoint outRoute = 11;   //飞机出航航迹
    repeated WayPoint returnRoute = 12;   //飞机返航航迹
    int32 realiablity = 13; //任务信息
}

//打击任务类型
enum StrikeType {
    Air_Intercept = 0;//空中拦截
    Land_Strike = 1;//对地攻击
    Maritime_Strike = 2;//对舰攻击
    Sub_Strike = 3;//反潜攻击
}

//巡逻任务
message PatrolMission {
    string id = 1;   //任务id
    string name = 2;   //任务名称
    string sideName = 3;   //所属阵营名称
    PatrolType patrolType = 4;   //巡逻任务类型
    string startTime = 5;   //任务开始时间
    string endTime = 6;   //任务结束时间
    repeated string patrolMembers = 7;   //执行巡逻的成员
    string patrolArea = 8;   //巡逻区域
    repeated WayPoint  outRoute = 9;   //飞机出航航迹
    repeated WayPoint  returnRoute = 10;   //飞机返航航迹
}

enum PatrolType {
    ASW = 0;  //反潜战斗巡逻
    ASuW_Naval = 1;//对舰战斗巡逻
    AAW = 2;//空中战斗巡逻
    ASuW_Land = 3;//对地战斗巡逻
    ASuW_Mixed = 4;//对地/对舰战斗巡逻
    SEAD = 5;//对敌防空压制
    SeaControl = 6;//制海巡逻
}

//支援任务
message SupportMission {
    string id = 1;  //任务id
    string name = 2;  //任务名称
    string sideName = 3;  //所属阵营名称
    string startTime = 4;  //任务开始时间
    string endTime = 5;  //任务结束时间
    repeated string supportMembers = 6;  //执行支援任务的成员
    string supportRoute = 7;  //支援航路
    repeated WayPoint outRoute = 8;  //飞机出航航迹
    repeated WayPoint returnRoute = 9;  //飞机返航航迹
}

//任务成员
message MissionMember {
    string missionId = 1;  //任务id
    string unitId = 2;  //实体id
    bool isEscort = 3;  //是否为护航，仅打击任务有效
    string sideName = 4; //阵营id
}

//任务区域
message MissionArea {
