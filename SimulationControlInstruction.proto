message BaseCarryUnit {
    string id = 1;  //飞机实体id
    string baseId = 2;  //基地实体id
}

//实体机动航路
message UnitRoute {
    string id = 1;  //实体id
    repeated WayPoint  Route = 2;  //航路点
}

message WayPoint {
    double lon = 1;  //经度
    double lat = 2;  //纬度
    float desiredAltitude = 3;  //期望高度
    float desiredSpeed = 4;  //期望速度
}

//实体机动高度
message UnitAltitude {
    string  id = 1;    //实体id
    float   altitude = 2;    //海拔高度单位米
    AircraftAltitudePreset  aircraftPreset = 3;    //飞机高度预设
    SubmarineDepthPreset    submarinePreset = 4;    //潜艇深度预设
}

//飞机高度预设枚举
enum AircraftAltitudePreset {
    AAPNone = 0;
    MinAltitude = 1; //最低海拔高度
    Low1000 = 2; //低海拔高度(1000英尺) 305米
    Low2000 = 3; //低海拔高度(2000英尺) 610米
    Medium12000 = 4; //中海拔高度(12000英尺) 3657米
    High25000 = 5; //高海拔高度(25000英尺) 7620米
    High36000 = 6; //高海拔高度(36000英尺) 10973米
    MaxAltitude = 7;  //最高海拔高度
}

//潜艇深度预设枚举
enum SubmarineDepthPreset {
    SDPNone = 0;
    Periscope = 1;// 潜望深度, 指潜艇潜望镜（其他升降装置）顶部高出水面0.5～1.0米的下潜深度， 常规潜艇艇体离水面大约为7—10米，核潜艇为9—15米
    Shallow = 2; // 浅潜望深度
    OverLayer = 3; // 水温跃变层之上
    UnderLayer = 4; // 水温跃变层之下
    MaxDepth = 5; // 最大深度
    Surface = 6;  //水面
}

//实体机动速度
message UnitSpeed {
    string id = 1;   //实体id
    float speed = 2;   //海拔高度单位米
    UnitThrottlePreset preset = 3; //油门速度预设
}

//单位油门预设
enum UnitThrottlePreset {
    FullStop = 0; //完全停止
    Loiter = 1; //游荡：留待（即悬停）
    Cruise = 2; //巡航
    Full = 3;    //满速
    Flank = 4; //全速：拼了命了跑
    UTPNone = 5;    //无
}
message AttackOrientation{
    string attackerId = 1;  //攻击者id
    int32 weapon = 2;  //打击者的weapon的DBid
    int32 qty = 3;  //使用的数量
    double lon = 4; //经度
    double lat = 5;//纬度
}
message AttackOrientationw{
