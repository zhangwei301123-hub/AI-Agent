//打击请求
message AttackRequestw {
    string attackerId = 1;    //攻击者id
    string contactId = 2;     //打击目标id
}
//打击返回
message AttackResponsew{
    ResponseDataw response = 1;//接口调用状态
}
//传感器控制请求
message SensorControlRequestw {
    string id = 1;   //实体id
    bool radar = 2; //雷达
    bool sonar = 3; //声纳
    bool ecm = 4;   //电子战传感器运行状态,true：开启,false:关闭，为空时保持现状

}
//声纳浮标部署请求
message SonobuoyDelpoyRequestw {
    string id = 1;  //实体id
    bool passiveOrActive = 2;  //被动声呐浮标或者主动声呐浮标
    bool shallowOrDeep = 3;  // 浮标部署位置是浅深度（最大水下40m）还是最大深度（最大水下225m）
    //false:浅深度
    //true：最大深度

}
