message IdRequest {
    string id = 1;  //id
    string sideName = 2; //sideId
}

//变更目指
message AttackChangeRequest {
    string unitId = 1;  //实体id
    string sideName = 2; //阵营名称
    string targetId = 3; //目标id
}
message SideMission{
