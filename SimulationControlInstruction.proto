syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.major.mpts.proto";
option java_outer_classname = "SimulationServiceProto";
option objc_class_prefix = "GS";

package proto;

import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";
import "google/protobuf/any.proto";

service SimulationService {

    rpc createDeduce(google.protobuf.Empty) returns (ResponseData) {}       //创建推演环境
    rpc scenarioAnalysis(ScenarioData) returns (IdNameResponse) {}       //想定解析
    rpc restoreScenario(google.protobuf.Empty) returns (ScenarioData) {}    //想定复原

    rpc getScenarioList(google.protobuf.Empty) returns (ScenarioList) {}    //获取想定列表


    rpc loadScenario(ScenarioFileRequest) returns (ResponseData) {}    //加载想定
    rpc getScenarioXml(google.protobuf.Empty) returns (ScenarioXml) {}    //获取xml格式想定数据
    rpc saveScenario(google.protobuf.Empty) returns (ResponseData) {}    //保存想定
    rpc saveAsScenario(ScenarioFileRequest) returns (ResponseData) {}    //另存为想定
    rpc startDedice(IdRequest) returns (ResponseData) {}    //开始推演
    rpc pauseDedice(google.protobuf.Empty) returns (ResponseData) {}    //暂停推演
    rpc endDedice(google.protobuf.Empty) returns (ResponseData) {}    //暂停推演
    rpc setTimeCompression(TimeCompressionRequest) returns (ResponseData) {}    //设置加速比
    rpc advanceProcess(AdvanceProcessRequest) returns (stream ProcessStateReprot) {}    //推进固定时间

    rpc publishSituation(google.protobuf.Empty) returns (stream SituationData) {}   //发布态势
    rpc getPublishSituation(google.protobuf.Empty) returns (SituationData) {}   //单独获取态势


    rpc publishAttackReport(google.protobuf.Empty) returns (stream AttackReport) {}   //发布战报
    rpc publishDetectionReport(google.protobuf.Empty) returns (stream DetectionReport) {}   //发布探测报告
    rpc publishLostReport(google.protobuf.Empty) returns (stream LostReport) {}   //发布目标丢失报告
    rpc publishWeaponFireReport(google.protobuf.Empty) returns (stream WeaponFireReport) {}   //武器发射报告
    rpc publishProcessStateReprot(google.protobuf.Empty) returns (stream ProcessStateReprot) {} //发布进程状态变化报告
    rpc publishCommLinkStatus(google.protobuf.Empty) returns(stream CommLinkUnits) {} //发布通信链路状态
    rpc getStrikeMissionInfo(google.protobuf.Empty) returns(stream StrikeMissionList){} //发布阵营中所有任务详细信息
    rpc publishLogMessages(google.protobuf.Empty) returns(stream LogMessages){} //发布日志报告


    rpc addAreaPoint(AreaPointList) returns (ResponseData) {}    //添加参考点
    rpc deleteAreaPoint(IdRequest) returns (ResponseData) {}    //删除参考点
    rpc addCombatArea(CombatAreaList) returns (ResponseData) {}    //添加作战区域
    rpc deleteCombatArea(IdRequest) returns (ResponseData) {}    //删除作战区域
    rpc getCombatArea(google.protobuf.Empty)returns(AreaPointList){}//获取作战区域

    rpc createStrikeMission(StrikeMission) returns (IdNameResponse) {}    //创建打击任务
    rpc createPatrolMission(PatrolMission) returns (IdNameResponse) {}    //创建巡逻任务
    rpc createSupportMission(SupportMission) returns (IdNameResponse) {}    //创建支援任务
    rpc deleteMission(IdRequest) returns (ResponseData) {}    //删除任务
    rpc addUnitToMission(MissionMember) returns (ResponseData) {}    //分配实体到AI任务
    rpc deleteUnitFromMission(MissionMember) returns (ResponseData) {}    //将实体从AI任务移除
    rpc adjustMissionArea(MissionArea) returns (ResponseData) {}    //调整任务区域
    rpc addTargetToStrikeMission(StrikeMissionTarget) returns (ResponseData) {}    //打击任务中增加打击目标
    rpc deleteTargetFromStrikeMission(StrikeMissionTarget) returns (ResponseData) {}    //将目标从打击任务中移除

    rpc addUnitToBattlefield(ScenarioCombatUnit) returns (IdNameResponse) {}    //部署实体到战场中
    rpc addUnitToBase(ScenarioCarryUnit) returns (IdNameResponse) {}    //部署实体到基地
    rpc moveUnit(UnitPosition) returns (ResponseData) {}    //更改实体部署位置
    rpc deleteUnit(IdRequest) returns (ResponseData) {}    //删除实体
    rpc adjustUnitMount(UnitMount) returns (ResponseData) {}    //调整实体挂载

    rpc aircraftTakeOffSingle(IdRequest) returns (ResponseData) {}    //飞机单机起飞
    rpc aircraftReturnToBase(IdRequest) returns (ResponseData) {}    //飞机返航至基地
    rpc setAircraftBase(BaseCarryUnit) returns (ResponseData) {}    //设置飞机基地
    rpc setUnitRoute(UnitRoute) returns (ResponseData) {}    //设置实体机动航路
    rpc adjustUnitAltitude(UnitAltitude) returns (ResponseData) {}    //设置实体机动海拔高度
    rpc adjustUnitSpeed(UnitSpeed) returns (ResponseData) {}    //设置实体机动速度
    rpc attackContact(AttackRequest) returns (AttackResponse) {}    //打击目标
    rpc attackOrientation(AttackOrientation) returns (ResponseData) {}    //纯方位攻击
    rpc cancelAttack(IdRequest) returns (ResponseData) {}    //放弃打击
    rpc adjustMissileRoute(UnitRoute) returns (ResponseData) {}    //调整巡航弹航路
    rpc getUnitSensors(IdRequest) returns (SensorStatusList){}  //根据实体id返回实体的传感器
    rpc controlUnitSensor(SensorControlRequest) returns (ResponseData) {}    //传感器控制
    rpc delpoySonobuoy(SonobuoyDelpoyRequest) returns (ResponseData) {}    //部署声纳浮标

    rpc getUseUpReport(google.protobuf.Empty) returns (SideUseUpReport) {}   //发布战损战果报告
    rpc getDamageStateReport(IdRequest) returns (stream DamageStateReport) {} //获取部件毁伤状态报告

    rpc setMissionDate(MissionDate) returns (ResponseData) {} //设置任务的结束时间 任务未结束 可以修改任务的结束时间
    rpc isBusyUnit(IdRequest) returns (google.protobuf.BoolValue) {} //判断一个单位是否被占用 占用解释=>存在任务

    rpc getMissionStatus(IdRequest) returns(MissionStatus){} //获取任务状态

    rpc getWeather(google.protobuf.Empty) returns(WeatherData){}//获取想定中的天气情况
    rpc setWeather(WeatherData) returns(ResponseData){}//设置想定中的天气

    rpc getSideMissions(IdRequest) returns(stream SideMission){} //获取阵营中所有任务

    rpc getSides(google.protobuf.Empty) returns(stream ScenarioSide){} //获取当前想定中所有阵营的信息
    rpc getCurrentScenarioName(google.protobuf.Empty) returns(ScenarioFileRequest){} //获取当前想定名称
    rpc getScenarioName(google.protobuf.Empty) returns(ScenarioFileName){} //获取想定文件夹中所有想定名称

    rpc sendJammingBomb(IdRequest) returns (ResponseData) {} //发送干扰弹

    rpc attackChange(AttackChangeRequest) returns(ResponseData) {} //变更目指

    rpc setCommLinkStatus(CommLinkStatus) returns(ResponseData) {} //设置两个单位之间的通信链路状态

    rpc buildCommLink(CommLinkStatus) returns(ResponseData) {} //构建通信链路

    rpc establishingRelationship(Relationship) returns(ResponseData) {} //添加指挥关系
    rpc declaringRelationship(Relationship) returns(ResponseData) {} //删除指挥关系

    rpc getEnvironmentZones(google.protobuf.Empty) returns(EnvironmentZones) {} //获取所有的环境区域
    rpc createcustomEnvironmentZone(EnvironmentZone) returns(ResponseData) {} //添加环境区域
    rpc removeCustomEnvironmentZone(IdRequest) returns(ResponseData) {} //删除环境区域
    rpc manualfireComponentStatus(fireComponentUnit) returns(ResponseData) {} //手动干预发射单元

    rpc bindNessUnitSensor(SensorControlRequest) returns (ResponseData) {}    //传感器毁伤
    rpc getUnitSensorStatus(SensorControlRequest) returns (SensorStatusList) {}    //传感器状态
    rpc getDayOrNight(DayOrNightRequest) returns(DayOrNight) {} //获取白天黑夜
    rpc createSatellite(createSatelliteRequest) returns(ResponseData) {} //部署卫星
    rpc setSideMissionsRealiablity(RealiablityRequest) returns(ResponseData) {} //设置武器可靠度
    rpc addJiaofanToBattlefield(JiaofanCombatUnit) returns (IdNameResponse) {}  //释放角反

    rpc struBeforeInputData(StruBeforeMGroundInputTargets) returns (ResponseData) {}  //筹划到互操作转发给任务级
    rpc struBeforeOutputData(google.protobuf.Empty) returns (StruBeforeMGroundInputTargets) {}  //任务级转发给交战集
    rpc publishContactLocation(google.protobuf.Empty) returns (stream StMGroundMoveList) {}  //发布导弹飞行中的目标位置数据
    rpc exeport(google.protobuf.Empty) returns (ResponseData) {}  //发布导弹飞行中的目标位置数据
    rpc addWeapon(addWeaponRequest) returns (ResponseData) {}  //为作战单元添加武器


    //----------------用户手册新增 start---------------------------
    rpc createSide(CreateSideRequest) returns (ResponseData) {} //创建阵营
    rpc getDeduceScenarioList(google.protobuf.Empty) returns (DeduceScenariosData) {}//获取推演实例列表
    rpc joinDeduceScenario(google.protobuf.Empty) returns (ResponseData) {}//加入当前推演实例
    rpc exitCurrentDeduceScenario(google.protobuf.Empty) returns (ResponseData) {}//退出当前推演实例列表
    rpc addDetectedRecord(DetectedRecordRequest) returns (ResponseData) {}//接收外部探测记录
    //----------------用户手册新增 end---------------------------

    //监听参数变动
    rpc acceptParameterChanges(google.protobuf.Empty) returns (stream ParamResponse) {}
    //设置海洋环境 需要指定一个区域
    rpc setMarineEnvData(MarineEnvData) returns (ResponseData) {}
    //增加一个目标
    rpc detectUnit(DetectUnitInfo) returns (ResponseData) {}
    //同时打击多个目标
    rpc attackContacts(AttackRequests) returns (AttackResponse) {}

    //武大对接
    rpc publishZntSituation(google.protobuf.Empty) returns (DeduceScenariosData) {}
    //专业数据同步接口
    rpc majorDataSync(ProfessionalData) returns (ResponseData) {}
    //获取全部任务信息接口
    rpc getAllTaskText(google.protobuf.Empty) returns (AllTaskText){}
    //设置阵营分数
    rpc addTotalScore(TotalScore) returns (ResponseData) {}
    //获取得分日志（参数只需要阵营id）
    rpc getScoreLog(TotalScore) returns (TotalScoreList) {}











    //---------------------------以下为武大接口----------------------------

    //rpc restoreScenariow(google.protobuf.Empty) returns (SituationDatas) {} //想定reset
    rpc startDedicew(IdRequestw) returns (ResponseDataw) {}    //开始推演
    rpc pauseDedicew(google.protobuf.Empty) returns (ResponseDataw) {}    //暂停推演
    rpc getEndSignal(google.protobuf.Empty) returns (EndSignalw){}    //获取推演结束信号*
    rpc getSituation(google.protobuf.Empty) returns (SituationDatas) {}   //得到态势*
    rpc getUseUpReportw(google.protobuf.Empty) returns (UseUpReports) {}   //发布战损报告

    rpc getAttackReport(google.protobuf.Empty) returns (AttackReports) {}   //得到战报
    rpc getDetectionReport(google.protobuf.Empty) returns (DetectionReports) {}   //发布探测报告 新发现的单装信息
    rpc aircraftTakeOffSinglew(IdRequestw) returns (ResponseDataw) {}    //飞机单机起飞
    rpc aircraftReturnToBasew(IdRequestw) returns (ResponseDataw) {}    //飞机返航至基地
    rpc setUnitRoutew(UnitRoutew) returns (ResponseDataw) {}            //设置实体机动航路
    rpc adjustUnitAltitudeAndSpeed(UnitAltitudeAndSpeedw) returns (ResponseDataw) {}    //设置实体机动海拔高度和速度
    rpc attackContactw(AttackRequestw) returns (ResponseDataw) {}                  //打击目标
    rpc controlUnitSensorw(SensorControlRequestw) returns (ResponseDataw) {}    //传感器控制
    rpc delpoySonobuoyw(SonobuoyDelpoyRequestw) returns (ResponseDataw) {}    //部署声纳浮标
    rpc cancelAttackw(IdRequestw) returns (ResponseDataw) {}    //放弃打击
    rpc getAllLog(google.protobuf.Empty) returns (LogMessages){}//获取黑窗口日志信息
    rpc getTimeCompression(google.protobuf.Empty) returns (TimeCompression){}//获取加速比
    rpc attackOrientationw(AttackOrientationw) returns (ResponseDataw) {}    //纯方位攻击




    //    public abstract SDKResponse<Void> seekByPercent(float var1);
    //---------------------------录制回放功能----------------------------
    rpc stop(google.protobuf.Empty) returns (ResponseData){}//停止回放
    rpc play(google.protobuf.Empty) returns (ResponseData){}//开始回放
    rpc pause(google.protobuf.Empty) returns (ResponseData){}//暂停回放
    rpc startRecord(google.protobuf.Empty) returns (ResponseData){}//开始录制
    rpc saveStopRecord(recordingParam) returns (ResponseData){}//结束保存录制（只需要视频名称）
    rpc setSpeed(recordingParam) returns (ResponseData){}//设置播放速度（只需要播放速度）
    rpc load(recordingParam) returns (ResponseData){}//加载回放（只需要视频名称）
    rpc listFiles(google.protobuf.Empty) returns (recordingParam){}//获取全部回放内容
    rpc gethandleList(google.protobuf.Empty)returns(stream HandleList){}//获取事件信息
    rpc getMissionList(google.protobuf.Empty)returns(MissionList){}//获取任务列表
    rpc getMoonInfoAndWeather(WayPoint) returns(MoonInfoAndWeather){}//获取任务列表
}
message MoonInfoAndWeather{
    map<string,string> map = 1;//月相&云层
}
//任务集合
message MissionList{
    message Mission{
        string missionId = 1;//任务id
        string missionName = 2;//任务名称
        int32 missionType = 3;//任务类型
        repeated AreaPoint areaPoints = 4;//区域参考点集合
    }
    repeated Mission mission = 1;

}
message HandleList{
    message Handle{
        string sideName=1;//阵营名称
        int32 handleType=2;//1:探测,2:攻击
        string unitId = 3;  //实体id
        string contactId = 4;  //目标id
        string dateTime = 5;//发生时间
    }
    repeated Handle handle=1;//事件信息集合

}
//阵营得分日志
message TotalScoreList{
    repeated TotalScore totalScore = 1;
}
//设置得分
message TotalScore{
    string sideId = 1;//阵营id
    int64 scoreTime = 2;//得分时间
    string scoreReason = 3;//得分原因
    int32 score = 4;//分数
}
message ScenarioList{
    repeated string scenarioName=1;//想定名称
}
//视频参数
message recordingParam{
    string videoName=1;//保存视频名称
    repeated string videoNameList = 2;//返回的视频名称集合
    enum Speed {
        x1=0;
        x5=1;
        x10=2;
        Full=3;
    }
    Speed speed = 3;//播放速度
}
//各专业接口数据
message ProfessionalData{
    string unitId = 1;//单位id
    string id = 2;//组件id
    string ProfessionalName = 3;//专业名称
    ProfessionalType professionalType = 4;//专业类型
    map<string,string> map = 5;//接收到的专业数据
    string retStr = 6;//返回的专业数据
}
//专业类型
enum ProfessionalType {
    SubOperation = 0 ; //潜操
    IntegratePower = 1;//综合电力
    UniversalLaunch = 2;//电磁发射
    NuclearPower = 3;//核动力
}
message  DetectUnitInfo {
    string detectId = 1;  //实体id
    string contactId = 2;  //目标id
    double lon = 3;  //目标经度
    double lat = 4;  //目标纬度
    IdentificationStatus status = 5; //目标被识别的状态
}


message DetectedRecordRequest{
    string record = 1;//探测记录
}

message CreateSideRequest{
    string sideName = 1;//阵营名称
}

//返回信息
message DeduceScenariosData {
    ResponseData response = 1;
    repeated DeduceScenario deduceScenarioList = 2;
}

message DeduceScenario {
    string id = 1;//推演实例ID
    string name = 2;//推演实例名称
}

message createDeduceScenario {//创建推演环境
    ResponseData response = 1;//返回信息
}

message ProcessStateReprot {
    EnumProcessState state = 1;//当前推演进程状态
    SituationTime time = 2;        //时间相关数据
    EnumTimeCompression timeCompression = 3;  //当前加速比
}

enum EnumProcessState {
    No = 0;//无
    Run = 1;//开始
    Pause = 2;//暂停
    End = 3;//结束
}
message MissionStatus{
    ResponseData response = 1;//返回信息
    EnumMissionStatus status= 2; // 状态枚举
}
enum EnumMissionStatus{
    Active = 0;//激活状态
    NotActive = 1;//未激活状态
}

message AdvanceProcessRequest {
    int64 advanceTime = 1;    //推进时长，单位秒
}


message ScenarioFileRequest {
    string fileName = 1;    //想定文件名称
    string scenarioXml = 2;  //xml格式想定文件
}

message ScenarioFileName {
    repeated ScenarioFileRequest fileNames = 1; //想定文件名称
}

//加速比枚举
enum EnumTimeCompression {
    OneSec = 0;//1秒
    TwoSec = 1;//2秒
    FiveSec = 2;//5秒
    FifteenSec = 3;//15秒
    Turbo = 4;//急速
}

//设置加速比请求
message TimeCompressionRequest {
    EnumTimeCompression timeCompression = 1;  //加速比
}

//    想定数据
message ScenarioData {
    string id = 1;    //想定id
    string name = 2;    //想定名称
    string description = 3;    //想定描述
    string startTime = 4;    //想定开始时间，时间戳，精确到毫秒，不填默认使用当前时间
    string duration = 5;    //想定持续时间，单位秒，不填默认1年
    repeated ScenarioSide sides = 6 ; //阵营信息
}

//  想定解析-阵营信息
message ScenarioSide {
    string id = 1;//阵营id
    string name = 2;  //阵营名称
    map<string, PostureStance> postures = 3;  //阵营之间立场，key为目标阵营，value为立场态度。
    repeated ScenarioCombatUnit combatUnits = 4;   //阵营下实体信息
    SideColor sideColor = 5;  //阵营颜色
    repeated Army armies = 6;         //部队信息
    repeated CombatArea combatAreas = 7;         //作战区域信息
    repeated AreaPoint areaPoints = 8;         //参考点信息
    repeated StrikeMission strikeMissions = 9; //任务信息
}

enum SideColor {
    Red = 0;//红
    Blue = 1;//蓝
    Green = 2;//绿
    Purple = 3;//紫
    Orange = 4;//橙
    DarkBlue = 5;//深蓝
    DarkPurple = 6;//酱紫
    DarkGreen = 7;//深绿
    CyanBlue = 8;//青蓝
}

enum PostureStance {
    Neutral = 0; //中立
    Friendly = 1; //友好
    Unfriendly = 2;//不友好
    Hostile = 3; //敌对
    PSUnknown = 4; //未知
}


//想定解析-实体信息
message ScenarioCombatUnit {
    string id = 1;//实体id
    string name = 2;  //实体名称
    string sideName = 3;    //所属阵营名称
    int32 dbId = 4; //装备数据库id
    UnitType type = 5; //实体类型
    double lon = 6; //所处经度
    double lat = 7; //所处纬度
    float heading = 8;//朝向角度
    //repeated MountWeapon mountWeapons = 9; //挂载武器
    int32 loadoutDBId = 9;    //挂载方案ID
    repeated ScenarioCarryUnit carryUnits = 10;//搭载实体
    bool autoDetectable = 11; //是否可被自动发现
    float alt = 12; //高度
    repeated int32 commDBId = 13; //通信设备
    UnitCategory unitCategory = 14;//实体类别

}
enum UnitType {
    None = 0; //无
    Aircraft = 1; //飞行器
    Ship = 2; //船。战舰
    Submarine = 3; //潜艇
    Facility = 4; //设施
    Aimpoint = 5; //瞄准点
    Weapon = 6; //武器
    Satellite = 7; //卫星
}
enum UnitCategory{
    Aircraft_Fighter = 0 ;//	战斗机
    Aircraft_Multirole = 1;//	多用途（战斗/攻击）
    Aircraft_ASAT = 2;//	反卫星武器 （反卫星武器）
    Aircraft_AirborneLaserPlatform = 3;//	机载激光平台
    Aircraft_Attack = 4;//	攻击机
    Aircraft_WildWeasel = 5;//	野鼬鼠 （防空压制）
    Aircraft_Bomber = 6;//	轰炸机
    Aircraft_CAS = 7;//	战场空中拦截（BAI/ CAS）
    Aircraft_OECM = 8;//	电子战
    Aircraft_AEW = 9;//	早期空中预警 （AEW）
    Aircraft_AirborneCP = 10;//	机载指挥站 （ACP）
    Aircraft_SAR = 11;//	搜索及救援 （SAR）
    Aircraft_MCM = 12;//	反水雷舰 （MCM）
    Aircraft_ASW = 13;//	反潜作战 （ASW）
    Aircraft_MPA = 14;//	海上巡逻机 （MPA）
    Aircraft_ForwardObserver = 15;//	前进观察员
    Aircraft_AreaSurveillance = 16;//	区域监视
    Aircraft_Recon = 17;//	侦查
    Aircraft_ELINT = 18;//	电子情报收集 （ELINT）
    Aircraft_SIGINT = 19;//	信号情报收集 （SIGINT）
    Aircraft_Transport = 20;//	运输机
    Aircraft_Cargo = 21;//	货机
    Aircraft_Commercial = 22;//	商业飞机
    Aircraft_Civilian = 23;//	民用飞机
    Aircraft_Utility = 24;//	通用直升机
    Aircraft_Utility_Naval = 25;//	海军通用直升机
    Aircraft_Tanker = 26;//	加油机 （空中加油）
    Aircraft_Trainer = 27;//	教练机
    Aircraft_TargetTowing = 28;//	牵引机
    Aircraft_TargetDrone = 29;//	靶机
    Aircraft_UAV = 30;//	无人机（UAV）
    Aircraft_UCAV = 31;//	无人作战飞行器（UCAV）
    Aircraft_AirShip = 32;//	飞艇
    Aircraft_Aerostat = 33;//	航空器
    Aircraft_IMGSAT = 34;//
    Aircraft_RORSAT = 35;//
    Aircraft_EORSAT = 36;

    Ship_CV = 37;//航空母舰
    Ship_CVA = 38;// 攻击型航空母舰
    Ship_CVB = 39;// 大型航空母舰
    Ship_CVE = 40;// 护航航空母舰
    Ship_CVGH = 41;// 导弹直升机航母
    Ship_CVH = 42;// 直升机航母
    Ship_CVL = 43;// 轻型航空母舰
    Ship_CVN = 44;//核动力航空母舰
    Ship_CVS = 45;// 水上飞机母舰
    Ship_SeaplaneCarrier = 46;
    Ship_B = 47;// 战列舰
    Ship_BB = 48;// 战列舰
    Ship_BBC = 49;// 指挥战列舰
    Ship_BBG = 50;// 导弹战列舰
    Ship_BBH = 51;// 直升机战列舰
    Ship_BCGN = 52;// 核动力导弹战列巡洋舰
    Ship_BM = 53;// 小型浅水重炮舰
