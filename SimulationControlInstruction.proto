    string areaId = 2;  //作战区域id
    string sideName = 3;  //阵营id
}


//任务目标
message StrikeMissionTarget {
    string missionId = 1; //任务id
    string targetsId = 2; //目标id
    string sideName = 3; //阵营id
}

//实体部署位置
message UnitPosition {
    string id = 1;  //实体id
    double lon = 2;  //所处经度
    double lat = 3;  //所处纬度
    float heading = 4;  //朝向角度0表示正北，0-360，不填为0，可以使用小数
    float altitude = 5;  //当前海拔高度
    float speed = 6;  //当前速度
}


//装备挂载
message UnitMount {
    string id = 1;   //实体id
    repeated MountWeapon mountWeapons = 2;   //挂载
}

