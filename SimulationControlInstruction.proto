//想定解析-搭载实体信息
message ScenarioCarryUnit {
    string id = 1;  //实体id
    string name = 2;  //实体名称
    string baseId = 3;  //基地实体id
    int32 dbId = 4;  //装备数据库id
    UnitType type = 5;  //实体类型
    int32 loadoutDBId = 6;    //挂载方案ID
    repeated int32 commDBId = 7; //通信设备
    //repeated MountWeapon mountWeapons = 6;  //挂载武器
}

//部队信息
message Army {
    string id = 1;   //部队ID
    string name = 2;//部队名称
    repeated string members = 3;//实体信息CombatUnit的ID
}

//挂载武器信息
message MountWeapon {
    int32 weaponDBId = 1; //武器数据库id
    string weaponModel = 2; //武器型号
    int32 number = 3; //武器数量
    WeaponType weaponType = 4; //武器类型
    WeaponTarget weaponTarget = 5; // 目标类型
    int32 weaponCount = 6;//武器总数
    double maxRange = 7;//最大射程
    double minRange = 10;//最小射程
    bool canManagedWeapon = 8; // 是否被接管
    int32 weaponMaxIndex = 9;//武器最大射程角标

}

enum WeaponType{
    Weapon_GuidedWeapon = 0;//制导武器
    Weapon_Rocket = 1;//火箭弹
    Weapon_IronBomb = 2;//炸弹
    Weapon_Gun = 3;//火炮
    Weapon_Decoy_Expendable = 4; //诱饵（一次性）,可消耗诱饵
    Weapon_Decoy_Towed = 5; //诱饵（拖曳型）
    Weapon_Decoy_Vehicle = 6; //诱饵（飞行器型）
    Weapon_TrainingRound = 7;//训练弹
    Weapon_Dispenser = 8;//布撒武器
    Weapon_ContactBomb_Suicide = 9;//接触炸弹（自杀式）
    Weapon_ContactBomb_Sabotage = 10;//接触炸弹（破坏式）
    Weapon_GuidedProjectile = 11;//制导炮弹
    Weapon_SensorPod = 12;//传感器吊舱
    Weapon_DropTank = 13;//副油箱（可抛弃）
    Weapon_BuddyStore = 14;//军用加油船；空中加油飞机；燃料供应基地
    Weapon_FerryTank = 15;//渡轮坦克
    Weapon_Torpedo = 16;//鱼雷
    Weapon_DepthCharge = 17;//深水炸弹
    Weapon_Sonobuoy = 18;//声纳浮标
    Weapon_BottomMine = 19;//沉底雷
    Weapon_MooredMine = 20;//锚雷
    Weapon_FloatingMine = 21;//浮动水雷
    Weapon_MovingMine = 22;//移动水雷
    Weapon_RisingMine = 23;//上浮水雷
    Weapon_DriftingMine = 24;//漂雷
    Weapon_DummyMine = 25;//假水雷
    Weapon_HeliTowedPackage = 26;//直升机拖曳包
    Weapon_BallisticMissile = 27; //弹道导弹
    Weapon_RV = 28;//再入飞行器
    Weapon_Laser = 29;//激光器
    Weapon_HGV = 30;//高超音速滑翔飞行器
}

// 武器能打击的目标类型
message WeaponTarget {
    bool isSurfaceShip = 1;         // 水面舰艇
    bool isSubsurface = 2;          // 水下目标
    bool isAircraft = 3;            // 飞行器
    bool isGuidedWeapon = 4;        // 制导武器
    bool isSatellite = 5;           // 卫星
    bool isRadar = 6;               // 雷达
    bool isRunway = 7;              // 跑道
    bool isSoftLandStructures = 8;  // 普通地面建筑
    bool isHardLandStructures = 9;  // 地面防御设施
    bool isTorpedoe = 10;           // 鱼雷
    bool isMine = 11;               // 地雷
    bool isHelicopter = 12;         // 直升飞机
    bool isSoftMobileUnit = 13;     // 普通移动单位
    bool isHardMobileUnit = 14;     // 装甲移动单位
    bool isUnderwaterStructure = 15;// 水下设施
    bool isCounterRAM = 16;         // 防空设施
    bool isAirfield = 17;           // 空域
}

//作战区域
message CombatArea {
    string id = 1; //作战区域id
    string name = 2; //作战区域名称
    string sideName = 3; //所属阵营
    repeated string areaPoints = 4; //参考点id集合
}

message CombatAreaList {
    repeated CombatArea combatAreaList = 1; //作战区域集合
    string sideName = 2;  //阵营名称
}

//参考点信息
message AreaPoint {
    string id = 1;      //参考点id,
    string name = 2;      //参考点名称
    string sideName = 3;  //阵营名称
    double lon = 4;      //参考点经度
    double lat = 5;      //参考点纬度
    string relativeToUnit = 6;      //参考点移动相对单位id
    BearingType bearingType = 7;      //参考点移动方位类型
}

message AreaPointList {
    repeated AreaPoint areaPointList = 1; //参考点集合
    string sideName = 2;  //阵营名称
}

enum BearingType {
    Fixed = 0; //固定方位
    Rotating = 1; //相对方位
}

//态势数据
message SituationData {
    SituationTime time = 1;        //时间相关数据
    repeated SituationSide side = 2;    //阵营数据
    int64 timeCompression = 3;//加速信息
    string situationStatus = 4;//想定运行状态
    bool recordStatus = 5;//录制状态
    int32 recordOrDeduce = 6;//态势数据是推演1 还是回放2
}
//态势-时间数据
message SituationTime {//时间相关数据
    string beginTime = 1;     //想定开始时间
    string currentTime = 2;   //想定当前时间
    int64 currentStep = 3;    //已推演时间，秒
}
//态势-阵营数据
message SituationSide {
    string id = 1;//阵营id
    string name = 2;  //阵营名称
    map<string, PostureStance> postures = 3;  //阵营之间立场，key为目标阵营，value为立场态度。
    repeated SituationCombatUnit combatUnits = 4;   //阵营下实体信息
    repeated SituationContact contacts = 5;         //阵营探测到的目标信息
    repeated Army armies = 6;         //部队信息
    repeated CombatArea combatAreas = 7;         //作战区域信息
    repeated AreaPoint areaPoints = 8;         //参考点信息
    repeated EnemyInfo enemyInfo = 9;//对立方所有单位位置信息
    repeated GroupUnit groupUnit = 11;//编队名称
    repeated StrikeMission strikeMissions= 12;//任务集合

}
message GroupUnit{
    repeated string groupIds = 1;//编队id集合
    string groupName = 2;//编队名称
}
//态势-实体数据
message SituationCombatUnit {
    string id = 1;//实体id
    string name = 2;  //实体名称
    string sideName = 3;    //所属阵营名称
    int32 dbId = 4; //装备数据库id
    string model = 5;//装备型号
    UnitType type = 6; //实体类型
    SpatialLocation location = 7;//空间位置
    Attitude attitude = 8; //姿态
    float speed = 9;//速度，海里/时
    WeaponData weaponData = 10;//实体为在空武器时的数据
    string baseId = 11; //所属基地实体id
    float health = 12; //系统完整性，百分比，可理解为血量
    string missionId = 13;    //执行的任务ID
    UnitStatus unitStatus = 14;   //实体状态
    AirOpsCondition airOpsCondition = 15;//飞机操作状态，仅飞机实体
    bool autoDetectable = 16; //是否可被自动发现
    repeated MountWeapon mountWeapons = 17;//挂载武器信息
    FuelStatus fuelStatus = 18;//燃油状态
    repeated SensorStatus sensorStatus = 19;//传感器状态
    FireIntensityLevel  fireIntensityLevel = 20;//伤害失火等级
    FloodingIntensityLevel  floodingIntensityLevel = 21;//进水损坏等级
    bool isJammed = 22;//是否被干扰
    string unitCategory = 23; //单位类别 是 战斗机还是巡逻舰等
    int32 damagedState = 24; //单元毁伤状态：0为正常，1为故障(发动机坏了),2为损毁(发射系统坏了)
    string baseName = 25; //给筹划弹地加的所属基地实体名称


    bool canManagedKinematics = 30; // 可以被管理运动
    SituationContact attackContact = 31; //要打击的目标
    repeated SituationContact avoidContacts = 32; //要避开的目标
    bool canManagedDetect = 33; // 可以被管理探测
    bool canManagedAttack = 34; // 可以被管打击
    repeated DetectionReport detectionReport = 35; //探测到的目标列表
    //bool canManagedWeapon = 36; // 可以接管武器(暂不需要)
    //repeated EnemyInfo enemyInfo = 35;//对立方所有单位位置信息
    UnitRoute unitRoute = 36;//航路点
    bool isFiring = 37;//当前单位是否开火（排除实体武器）

    repeated ProfessionalData professionalData = 38;//单位上的专业信息



}





message EnemyInfo{
    string id = 1;//对立单位id
    string name = 2;//对立单位名称
    double lon = 3; //所处经度
    double lat = 4; //所处纬度
    float alt = 5;//当前海拔高度
}
//伤害失火等级
enum FireIntensityLevel {
    NoFire = 0;//没有失火
    MinorFire = 1;//小型失火
    MajorFire = 2;//大型失火
    SevereFie = 3;//严重失火
    Conflagration = 4;//面临失火失控风险
}
//进水损坏等级
enum FloodingIntensityLevel {
    NoFlooding = 0;//没有进水
    MinorFlooding = 1;//小规模进水
    MajorFlooding = 2;//大规模进水
    SevereFlooding = 3;//严重进水
    Capsizing = 4;//面临沉没风险
}
//空间位置，经纬高
message SpatialLocation {
    double lon = 1; //所处经度
    double lat = 2; //所处纬度
    float alt = 3;//当前海拔高度
}
//姿态
message Attitude {
    float heading = 1;     //偏航
    float roll = 2;      //滚转
    float pitch = 3;    //俯仰
}
//在空武器相关数据
message WeaponData {
    string firingUnitId = 1 ;//发射实体Id
    repeated ContactAndWeapon contactAndWeapon = 2;//
    WeaponType weaponType = 3;//武器类型
}
//在空武器相关数据
message WeaponArrayData {
    string firingUnitId = 1 ;//发射实体Id
    repeated ContactAndWeapon contactAndWeapon = 2;//
}

message ContactAndWeapon{
    string contactId = 1;     //打击目标id
    string weaponId = 2;     //武器 id
}

//实体状态
enum UnitStatus {
    Unassigned = 0;//无
    OnPlottedCourse = 1;//在绘制航线
    EngagedOffensive = 2;//参与进攻
    EngagedDefensive = 3;//参与防守
    OnAttackRun = 4;//进攻中
    OnPatrol = 5;//巡逻
    RTB = 6;//返回基地
    Tasked = 7;
    FormingUp = 8; // 正在重新组队
    NONE_9 = 9;
    RTB_Manual = 10;//手动返回基地
    OnSupportMission = 11;//支援任务
    OnFerryMission = 12;
    HeadingToRefuelPoint = 13;//前往加油站
    Refuelling = 14;//加油
    RTB_MissionOver = 15;//任务完成返回基地
    GroupLead_SlowingToAllowFormUp = 16;//领队放慢速度进行组队
    NONE_17 = 17;
    NONE_18 = 18;
    RTB_Group = 19;//编队返航
    RTB_CalledOff = 20;//取消返航
    WaitForPathfinder = 21;//等待寻路
    AttemptingToReestablishComms = 22;//尝试重新建立通讯
}
//飞机操作状态
enum AirOpsCondition {
    Airborne = 0; //在空
    Parked = 1; //停放状态
    TaxyingToTakeOff = 2;//正在滑行准备起飞
    TaxyingToPark = 3;//正在滑行到停机位
    TakingOff = 4;//正在起飞
    Landing_PreTouchdown = 5;//最终进场
    Landing_PostTouchdown = 6;//正在完成降落
    Readying = 7;//正在进行出动准备
    HoldingForAvailableTransit = 8;//等待可用的滑行道/升降机
    HoldingForAvailableRunway = 9;//等待跑道空闲
    HoldingOnLandingQueue = 10;//处于降落队列中
    RTB_Air = 11;//正在返回基地
    PreparingToLaunch = 12; //准备出动
    ManoeuveringToRefuel = 13;//机动到加油阵位
    Refuelling_Air = 14; //正在加油
    OffloadingFuel = 15;//卸载燃油
    DeployingDippingSonar = 16;//部署吊放声纳
    EmergencyLanding = 17;//燃油量极低准备紧急降落
    TaxyingToFlightDeck = 18;//移动到飞行甲板
    BVRAttack = 19;//正在执行超视距攻击任务
    BVRCrank = 20;//
    Dogfight = 21;//近距离空战
    TransferringCargo = 22;//转运货物
    BVRDrag = 23;//正在执行超视距拖曳
}

//燃油状态
message FuelStatus {
    double currentFuel = 1; //当前燃油
    double fuelBurnRate = 2; //当前燃油消耗率
}
message SensorStatusList{
    repeated SensorStatus sensorStatus = 1;//传感器信息
}

//传感器状态
message SensorStatus {
    string id = 1;//传感器id
    string name = 2;//传感器名称
    SensorCategory sensorCategory = 3;//传感器类别
    bool activeCapable = 4;//传感器是否具备主动激活
    bool isActive = 5;//传感器当前是否已激活
    ComponentStatus ComponentStatus = 6;//部件状态
    repeated string sensorFrequency = 7;//照明
    repeated string sensorSearchFreq= 8; //搜索追踪
    float maxDist = 9;//最大探测距离
    float maxHeight = 10;//最大探测高度
    float beginAngle = 11;//探测起始角度
    float endAngle = 12;//探测终止角度
    bool canManagedDetect =13;//是否被接管
    int32 startNum = 14;//传感器扇叶开启数量
    message IsContactType{
        bool isAirSearch=1;//空
        bool isSurfaceSearch=2;//水面
        bool isSubSearch=3;//水下
        bool isLandSearchMobile=4;//地？
        bool isLandSearchFixed=5;//地？
    }
    IsContactType isContactType=15;//支持探测的目标类型
    float minDist = 16;//最小探测距离


}
enum SensorCategory {
    Radar = 0;//雷达
    Sonar = 1;//声纳
    ECM = 2;//电子战
}

enum ComponentStatus {
    unUse = 0;//不用
    Operational = 1;//正常的
    Damaged = 2;//破损
    Destroyed = 3;//被毁
}

//目标信息
message SituationContact {
    string id = 1;//目标Id
    string name = 2;//目标名称
    string sideName = 3;//所属阵营
    string model = 4;//目标型号
    float speed = 5;//目标速度
    ContactType contactType = 6;//目标类型
    SpatialLocation location = 7;//空间位置
    Attitude attitude = 8; //姿态
    bool sideIsKinwn = 9;//是否已知所属阵营
    bool isAltitudeKnown = 10;//是否已知高度
    bool isHeadingKnown = 11;//是否已知航向
    bool isSpeedKnown = 12;//是否已知速度
    IdentificationStatus identificationStatus = 13;//识别状态
    string detectorSideName = 14;//探测方阵营名称
    bool hasUncertaintyArea = 15;//是否有不确定区域
    repeated SpatialLocation uncertaintyArea = 16;//不确定区域
    float timeSinceDetect = 17;//距上次探测的时间，单位秒
    float age = 18;//重新探测时间
    int32 weaponsAimingAtTheTarget = 19;//武器瞄准数量
    string unitCategory = 20; //目标类型
}
enum ContactType {
    Air = 0;//空中单位//
    Missile = 1;//导弹//
    Sur = 2;//水面单位//
    Sub = 3;//水下目标
    UndeterminedNaval = 4;//
    AimPoint = 5;//目标点
    Orbital = 6;//有轨道单位
    Facility_Fixed = 7;//固定设施
    Facility_Mobile = 8;//移动设施
    Torpedo = 9;//鱼雷
    Mine = 10;//地雷、水雷
    Explosion = 11;//炸弹
    Undetermined = 12;//未确定的
    Decoy_Air = 13;//空中诱饵
    Decoy_Surface = 14;//水面诱饵
    Decoy_Land = 15;//地面诱饵
    Decoy_Sub = 16;//水下诱饵
    Sonobuoy = 17;//声呐浮标
    Installation = 18;//军事基地
    AirBase = 19;//空军基地
    NavalBase = 20;//海军基地
    MobileGroup = 21;//移动基地
    ActivationPoint = 22;//触发点
}

enum IdentificationStatus {
    Unknown = 0;//未知
    KnownDomain = 1;//已知领域
    KnownType = 2;//已知类型
    KnownClass = 3;//已知级别
    PreciseID = 4;//准确信息
}

//战报信息
message AttackReport {
    string fireUnitId = 1; //发射实体Id
    string fireUnitName = 2;  //发射实体名称
    string fireUnitModel = 3;  //发射实体型号
    UnitType fireUnitType = 4;    //发射实体类型
    string fireUnitSideName = 5;  //发射实体所属阵营
    string weaponId = 6; //使用武器ID
    string weaponName = 7;//使用武器名称
    string weaponModel = 8; // 使用武器型号
    string targetId = 9; //目标Id
    string targetName = 10;  //目标名称
    string targetModel = 11;  //目标型号
    UnitType targetType = 12;  //目标类型
    string targetSideName = 13;//目标所属阵营名称
    bool isHit = 14;  //是否命中
    int64 hitStep = 15;   //命中时帧数，当前时间-开始时间，单位秒
    string hitTime = 16;  //命中时想定时间
    SpatialLocation hitLocation = 17; //命中空间位置
    string parentWeaponId = 18; //武器为弹道弹产生的战斗部时，在此提供弹道弹母体的id,方便与武器发射报告进行关联
    float targetHealth = 19; //目标当前血量，百分比
    float timeSinceLaunch = 20; //武器自发射运行时间
    string targetSideId = 21;//目标所属阵营id
}

//探测报告
message DetectionReport {
    string targetId = 1; //目标Id
    string targetName = 2;  //目标名称
    string targetModel = 3;  //目标型号
    string targetSideName = 4;//目标所属阵营名称
    ContactType targetType = 5;  //目标类型
    SpatialLocation targetLocation = 6; //目标空间位置
    string detectorId = 7; //发现者实体Id
    string detectorName = 8;  //发现者实体名称
    string detectorModel = 9;  //发现者实体型号
    UnitType detectorType = 10;    //发现者实体类型
    string detectorSideName = 11;  //发现者所属阵营
    string detectorSensorName = 12; //发现者使用传感器名称

    SpatialLocation detectorLocation = 13; //发现者空间位置
    int64 detectStep = 14;   //探测时帧数，当前时间-开始时间，单位秒
    string detectTime = 15;  //探测时想定时间
    SensorStatusList targetSensor = 16; //目标传感器信息
    repeated string weaponIds = 17;
    bool isSonobuoy = 18;//是否是声呐浮标
}

//目标丢失报告
message LostReport {
    string targetId = 1; //目标Id
    string targetName = 2;  //目标名称
    string targetModel = 3;  //目标型号
    string targetSideName = 4;//目标所属阵营名称
    ContactType targetType = 5;  //目标类型
    SpatialLocation lostLocation = 6; //丢失时空间位置
    int64 lostStep = 14;   //丢失时帧数，当前时间-开始时间，单位秒
    string lostTime = 15;  //丢失时想定时间
}

//武器发射报告
message WeaponFireReport {
    string fireUnitId = 1; //发射实体Id
    string fireUnitName = 2;  //发射实体名称
    string fireUnitModel = 3;  //发射实体型号
    UnitType fireUnitType = 4;    //发射实体类型
    string fireUnitSideName = 5;  //发射实体所属阵营
    SpatialLocation fireUnitLocation = 6; //发射实体空间位置
    string weaponId = 7; //使用武器ID
    string weaponName = 8;//使用武器名称
    string weaponModel = 9; // 使用武器型号
    string targetId = 10; //目标Id
    string targetName = 11;  //目标名称
    string targetModel = 12;  //目标型号
    ContactType targetType = 13;  //目标类型
    string targetSideName = 14;//目标所属阵营名称
    SpatialLocation targetLocation = 15; //目标空间位置
    int64 fireStep = 16;   //发射时帧数，当前时间-开始时间，单位秒
    string fireTime = 17;  //发射时想定时间
    string fireUnitSideId = 18;  //发射实体阵营id
