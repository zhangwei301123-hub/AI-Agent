}
//部件所属类别
enum PartsType {
    Mount = 0;//挂架
    Magazine = 1;//弹仓
    Sensor = 2;//传感器
    CommDevice = 3;//通讯与数据链
    DockFacility = 4;//停靠设施
    AirFacility = 5;//机场设施
    Engine = 6;//动力
}
//损伤严重程度
enum DamageSeverityFactor {
    Light = 0;//轻微损伤
    Medium = 1;//中等损伤
    Heavy = 2;//严重损伤

}

//指挥关系
message Relationship {
    string superiorId = 1; //上级id
    string subordinateId = 2;  //下级id
}

//设置通信链路通断状态
message CommLinkStatus {
    string originUnitId = 1; //发送端id
    string destUnitId = 2;  //接收端id
    bool commStatus = 3; //通信链路通断状态
}
//通信链路集合
message CommLinkUnits {
    repeated CommLinkUnit commLinkUnit = 3; //通信链路通断状态集合
}

//通信链路通断状态信息
message CommLinkUnit {
    ScenarioCombatUnit originUnit = 1; //发送端
    ScenarioCombatUnit destUnit = 2;  //接收端
    bool commStatus = 3; //通信链路通断状态
}

//手动干预发射单元是否故障
message fireComponentUnit {
    string unitId = 1; //实体id
    bool fireComponentStatus = 3; //发射单元状态
}
//返回xml格式想定
message ScenarioXml {
    string xml = 1; //xml格式想定
}

//角反实体信息
message JiaofanCombatUnit {
    string id = 1;//实体id
    string name = 2;  //实体名称
    string sideName = 3;    //所属阵营名称
    double lon = 6; //所处经度
    double lat = 7; //所处纬度
    float heading = 8;//朝向角度
    bool autoDetectable = 11; //是否可被自动发现
    repeated WayPoint Route = 15;  //航路点
}


// 环境区域
message EnvironmentZones{
    repeated EnvironmentZone environmentZone = 1;
}
message EnvironmentZone {
    string id = 1;
    string name = 2; //名称
    repeated AreaPoint areas = 3; //参考点
    WeatherData weather = 4; //天气
}

message EnvironmentZoneRequest {
    string id = 1; //环境区域id
    string name = 2; //名称
    repeated AreaPoint areas = 3; //
    WeatherData weather = 4; //
}
// bool参数
message BoolRequest {
    bool value = 1;
}

// 获取白天黑夜参数
message DayOrNightRequest {
    double longitude = 1;
    double latitude = 2;
}

// 白天黑夜信息
message DayOrNight {
    EnumDayType dayType = 1;
}

// 白天黑夜枚举
enum EnumDayType {
    Day = 0;
    Twiligh = 1;
    Night = 2;
}


// 武器可靠度设置
message RealiablityRequest{
    map<int32, int32> weaponLimits = 1;  //武器DBID：可靠度
}

// 部署卫星到战场
message createSatelliteRequest {
    int32 DBID = 1; //卫星数据库id
    int32 orbitIndex = 2; //卫星轨道索引
    string sideName = 3;//阵营名称
}

//导出excel
message exeportExcel {
    string name = 3;//名称
}

//发布日志
message LogMessages {
    repeated LogMessage logMessage = 1;//日志
}
 //日志
message LogMessage {
    string logMessage = 1;//日志信息
    string logMessageTime = 2;//日志时间
    string sideName = 3;//阵营名称
}

message addWeaponRequest {
    string unitID = 1;
    int32 dbid = 2;
    int32 qty = 3;
}


message DllModelRequest{
    string unitId = 1; //仿真模型id
    string dllName = 2; //动态库名称
}

message ParamResponse{
    string unitId = 1; //仿真模型id
    float turnSpeed = 2; //转速
    float speed = 3; //速度
    float heading = 4; //跺脚
    float chaoxiang = 5; //朝向
    float alt = 6; //海拔
    string model = 7; //类型
}

//海洋环境数据
message MarineEnvData{
    string id = 1; //环境数据id
    string name = 2; //环境数据名称
    float temperature = 3; // 平均气温 范围[-50,50]
    float rain = 4;//降雨量 范围[0,50]
    float cloud = 5; // 天空云量 范围[0,10]
    float seaState = 6; //风力/海况 范围[0,9]
    repeated SoundEnvData soundEnvData = 7;
    repeated AreaPoint areas = 8; // 划定区域
}
message SoundEnvData{
    float depth = 1; // 深度
    float temp = 2;//水温
    float salinity = 3; // 盐度
    float density = 4; //水密度
    float pressure = 5; //水下 压强

}
//全部任务信息
message AllTaskText{
    repeated TaskText taskText=1;
}
//全部任务信息
message TaskText{
    string sideId = 1;//阵营id
    repeated StrikeMission strikeMission = 2;//打击任务
    repeated PatrolMission patrolMission = 3;//巡逻任务
    repeated SupportMission supportMission = 4;//支援任务

}

